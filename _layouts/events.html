---
layout: default
---

<section class="page-header">
  <div class="eyebrow">{{ page.eyebrow }}</div>
  <h1 data-r="t-page">{{ page.title }}</h1>
  <p class="lead" style="margin-bottom:30px;">{{ page.intro }}</p>
  <a href="{{ site.facebook_events_url }}" target="_blank" rel="noopener" class="btn btn-red btn-lg">View Events on Facebook</a>
</section>

<section style="max-width:1000px; margin:0 auto; padding:50px 40px 64px;">
  <div class="rule-heading"><h2>Where to Find Us</h2></div>
  <div data-r="g-split" style="display:grid; grid-template-columns:1.05fr 0.95fr; gap:0; border:1px solid #cdbf9f; background:#fff; box-shadow:0 20px 44px -28px rgba(30,42,79,0.5);">
    <div style="padding:40px;">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px;">
        <span style="width:42px; height:42px; border-radius:50%; background:#1e2a4f; display:flex; align-items:center; justify-content:center;"><svg viewBox="0 0 24 24" fill="#fbf6ec" style="width:22px;height:22px;"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></span>
        <span class="eyebrow" style="margin-bottom:0;">Our Facebook Page</span>
      </div>
      <div style="font-family:'Newsreader',serif; font-size:22px; line-height:1.5; color:#2a3354; margin:0 0 20px;">{{ content }}</div>
      <p style="font-size:15px; line-height:1.6; color:#5c574e; margin:0 0 26px;">Give us a follow so the next event lands right in your feed. It's the fastest way to know where we'll be next.</p>
      <a href="{{ site.facebook_events_url }}" target="_blank" rel="noopener" class="btn btn-navy">See Our Event Calendar</a>
    </div>
    <div data-r="split-img" style="border-left:1px solid #cdbf9f;">
      <img src="{{ '/assets/images/gallery/photo-14.png' | relative_url }}" alt="Neighbors gathered at a Benicians Adopting Benicia event" style="width:100%; height:100%; min-height:340px; object-fit:cover; display:block;">
    </div>
  </div>
</section>
