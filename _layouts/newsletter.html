---
layout: default
---

<section class="page-header">
  <div class="eyebrow">{{ page.eyebrow }}</div>
  <h1 data-r="t-page">{{ page.title }}</h1>
  <p class="lead">{{ page.subtitle }}</p>
</section>

<section style="max-width:760px; margin:0 auto; padding:46px 40px 8px;">
  <div data-r="card-stack" style="background:#fff; border:1px solid #cdbf9f; box-shadow:0 18px 40px -26px rgba(30,42,79,0.5); padding:40px; display:flex; align-items:center; justify-content:space-between; gap:28px; flex-wrap:wrap;">
    <div style="display:flex; align-items:center; gap:22px;">
      <div style="width:64px; height:80px; background:#f3e9d5; border:1px solid #cdbf9f; position:relative; flex-shrink:0;">
        <span style="position:absolute; top:10px; left:8px; right:8px; height:2px; background:#b08534;"></span>
        <span style="position:absolute; top:18px; left:8px; right:14px; height:1.5px; background:#cdbf9f;"></span>
        <span style="position:absolute; top:24px; left:8px; right:10px; height:1.5px; background:#cdbf9f;"></span>
        <span style="position:absolute; top:30px; left:8px; right:18px; height:1.5px; background:#cdbf9f;"></span>
      </div>
      <div>
        <div class="eyebrow" style="margin-bottom:0;">{{ page.issue_label }}</div>
        <h2 style="font-family:'Newsreader',serif; font-size:26px; font-weight:600; margin:4px 0 0;">{{ page.issue_title }}</h2>
      </div>
    </div>
    <a href="{{ site.newsletter_url }}" target="_blank" rel="noopener" class="btn btn-red">Read the Latest Issue</a>
  </div>
</section>

<section style="max-width:760px; margin:0 auto; padding:30px 40px 64px;">
  <div style="border-top:1px solid #cdbf9f; padding-top:28px; text-align:center; font-size:16px; line-height:1.65; color:#5c574e;">
    {{ content }}
  </div>
</section>
