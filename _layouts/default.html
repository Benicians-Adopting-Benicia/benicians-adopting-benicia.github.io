<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/images/logo.png' | relative_url }}">
  {% seo %}
  {% if page.lightbox %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
  {% endif %}
</head>
<body>
  <div data-site="bab" style="min-height:100vh; display:flex; flex-direction:column;">
    {% include header.html %}
    <main style="flex:1;">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
  {% if page.lightbox %}
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script>GLightbox({ selector: '.glightbox' });</script>
  {% endif %}
</body>
</html>
