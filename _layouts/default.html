<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#2e4482', dark: '#0e3d79', light: '#3d5499' }
          },
          fontFamily: {
            playfair: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ '/assets/images/logo.png' | relative_url }}">
  {% seo %}
  {% if page.lightbox %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
  {% endif %}
</head>
<body class="font-playfair bg-white text-gray-900 min-h-screen flex flex-col">
  {% include header.html %}
  <main class="flex-1">
    {{ content }}
  </main>
  {% include footer.html %}
  {% if page.lightbox %}
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script>GLightbox({ selector: '.glightbox' });</script>
  {% endif %}
</body>
</html>
